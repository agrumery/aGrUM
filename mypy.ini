[mypy]
python_version = 3.10
show_error_codes = True
warn_unused_ignores = True

# pyagrum SWIG module — no stubs yet
[mypy-pyagrum]
ignore_missing_imports = True

[mypy-pyagrum.*]
ignore_missing_imports = True

# Third-party packages without type stubs in devAgrum virtualenv
[mypy-pydot]
ignore_missing_imports = True

[mypy-pydot.*]
ignore_missing_imports = True

[mypy-pandas]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-scipy]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-sklearn]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-tqdm]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-pylab]
ignore_missing_imports = True

[mypy-cairosvg]
ignore_missing_imports = True

[mypy-cairosvg.*]
ignore_missing_imports = True

[mypy-ipywidgets]
ignore_missing_imports = True

[mypy-ipywidgets.*]
ignore_missing_imports = True
